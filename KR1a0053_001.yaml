body:
  text: 易象意言宋蔡淵撰􅅀者奇也陽之數也􅄲者偶也隂之數也古者伏羲氏仰觀俯察見隂陽有奇偶之數故畫􅅀以象陽畫􅄲以象隂見隂陽之中各復生隂陽故再倍而三為卦者八所謂小成者是也因而重之故三倍而六為卦者六十有四下三畫為貞而上三畫為悔也卦有六位初二三四五上也二氣消息自下而上故卦自下始爻有四象少陽少隂老陽老隂也少陽之數七少隂之數八老陽之數九老隂之數六老變而少不變聖人取變者為用故陽爻曰九隂爻曰六六七八九者隂陽之用數也陽以進為用故少于七而老于九隂以退為用故少于八而老于六凡爻位俱陽與爻位俱隂為當位或陽爻位隂或隂爻位陽為不當位三畫之卦有上中下之位以上遇上以中遇中以下遇下則其位同也故六位之卦初與四為應位二與五為應位三與上為應位陽爻遇隂爻隂爻遇陽爻則為有應若陽爻遇陽爻隂爻遇隂爻則為無應六位之卦其初難知其上易知為本末者也三與五為陽二與四為隂陽以升為用故進成乎五隂以降為用故退成乎二五者陽成而得中也二者隂成而得中也故皆吉三陽剛未成而不中故危四隂柔未成而不中故懼凡兩爻相比在下曰承在上曰乘以隂承陽以陽乘隂為順陽承隂隂乘陽為逆案陽乘隂之乘原本誤作承隂乘陽之乘原本誤作盛今並改正凡三爻之卦剛柔雜者皆主一剛一柔故震巽主初爻坎離主中爻艮兊主上爻六爻之卦剛柔雜者亦多取剛柔少爻為主凡卦中陽為大隂為小陽利君子隂利小人大畜小畜大過小過皆取隂陽為義凡六位隂陽多以志言陽實為富隂虛為貧隂能有陽亦為富小畜謙之五皆以四能有陽而稱富也凡剛進而上遇柔則利遇剛則不利如大壯之四曰藩決不羸大畜之三曰良馬逐皆前遇乎柔也大壯之初曰征凶三曰羝羊觸藩羸其角大畜之初曰有厲利巳皆前遇乎剛也陽在上之物隂在下之物六位惟二五得隂陽之正中則不失乎善偏則流為惡八卦相錯惟二五得中夫陽動于二隂之下則為震隂伏于二陽之下則為巽至于為坎艮為離兊無非有取于隂陽相錯也故有是理則有是象有是象則有是事此自然之理也且六爻之卦擬議變化于一爻之中逺近相取初不可以內外三爻之卦而拘也故賁之三上下皆隂也而聖人繫之以濡如之辭豈非有取于坎象歟晉之四下乘二隂也而聖人繫之以鼫鼠之象又豈非有取于艮象歟至于屯之三曰入于林中是兼上下二隂而取也復之四曰中行是兼上下四隂而取也觀是四者聖人擬議之旨亦可以類推矣隂陽相錯感應之理自然而然亦非聖人心思智慮之所能為也後世互體之説不可謂全無義理特其附會穿鑿而流于術所以不可用也彖傳言剛柔上下往來者八卦隨蠱賁咸恆損益渙也止言剛來者訟無妄二卦在八卦者或曰柔上剛下或曰剛上柔下或止曰上下然其為卦皆三隂三陽本具乾坤之體而上下交往來也乾剛交坤而成震坎艮坤柔交乾而成巽離兊故言剛來剛下者明乾剛在上而下交坤言柔來柔下者明坤柔在上而下交乾也若剛上之與柔上則又乾剛在下而上交坤坤柔在下而上交乾者也是皆本諸乾坤之交而互取之耳至于訟與無妄則止言剛來剛自外來蓋其為卦皆四陽二隂非乾坤上下之交者故乾體居上不動而所以為坎為震之剛者皆自外來也夫子言卦變之義于此可見其兩端焉本一氣也生則為陽消則為隂易之道生道也震艮陽卦震取初艮取上者理當然也巽兊隂卦與震艮為對者也乃不取初上之隂而取二五之陽也至于復姤夬剝之類莫不取陽為用焉是知陽能生隂不能生易之本也非聖人特賤乎隂而不取也乾坤體純坎離體交而其用皆在中故乾坤坎離之用皆在二五也至于乾坤相錯則為泰否坎離相錯則為既濟未濟亦皆主二五為用也坎者隂陷陽而陽難離者隂麗陽而陽明是坎雖陽卦而陽不得用離雖隂卦而陽猶得用故既濟未濟名義主坎陽卦也其亨主離以離陽得用也文王周公所繫之辭有以理言者如元亨利貞直方大之類是也有以事言者如觀盥而不薦師出以律之類是也有以象言者如履虎尾見龍在田之類是也有以占辭言者如利建侯行師利用為大作之類是也有以斷辭言者如征凶無攸利悔亡吉無咎之類是也卦爻所繫大略不出乎此矣三百八十四爻之義有取之于本爻者如乾之初曰潛龍勿用屯之初曰利建侯是也有取之于下近爻者如姤之二曰包有魚大過之二曰枯楊生稊老夫得其女妻是也有取之于上近爻者如大過之五曰枯楊生華老婦得其士夫小過之四曰弗過遇之是也有取之于應爻者如解之四曰解而拇泰之五曰帝乙歸妹以祉元吉是也有取之于應位者如乾之二五曰利見大人豐之初曰遇其配主四曰遇其夷主是也有取之于一卦之主爻者如姤之五曰以把包瓜比之初曰終來有他吉是也有取之于往來爻者如賁之二曰賁其須損之上曰得臣無家是也有取之于上下二近爻者如賁之三曰賁如濡如屯之三曰惟入于林中是也有取之于五爻之中者如復之四曰中行獨復艮之三曰艮其限是也有取之于六爻之中者如益之三曰有孚中行告公用圭四曰中行告公從是也有取之于本卦變極者如坤之上曰龍戰于野否之上曰傾否是也以是推之則諸爻之義皆可得矣乾坤屯蒙卦之名也健順動説卦之性也天地風雷卦之象也隂陽剛柔卦之才也中正危懼卦之位也應害逺近卦之情也上下乘承卦之體也元亨利貞卦之辭也剛柔往來卦之變也太極理也隂陽氣也剛柔質也乾者太極之動故釋彖不言隂陽剛柔坤主質故以柔言否泰交不交氣也又具乾坤之體故皆以隂陽言否類于坤故又以剛柔言餘卦不滯乎事則滯乎物故皆以剛柔言四營而成易十有八變而成卦易與變本一事也未入用則謂之易巳入用則謂之變蓋易無體而變有體也觀變于隂陽而立卦發揮于剛柔而生爻隂陽剛柔皆畫也未入用則謂之隂陽巳入用則謂之剛柔蓋隂陽氣而剛柔質也故夫子釋乾坤闔闢曰變而不曰易釋卦爻之用曰剛柔而不曰隂陽天數始于一地數始于二隂無首而從陽者也先陽而動則迷從陽之後則得故曰先迷後得主利天數終于九地數終于十陽無終代其終者地也故曰地道無成而代有終也天地主體四時日月主用富貴主體聖人蓍龜主用伏羲八卦之序以二氣消長成文王八卦之序以萬物盛衰成伏羲八卦是造化生物之理文王八卦是造化運行之理天地者其體也四時者其用也日月所以為四時至德所以生天地易之道有巳正而他爻取之以為邪者有巳凶而他爻得之以獲吉者屯之初非不正也而二近之則以為寇旅之上非不凶也而五承之以得譽命乾知大始坤作成物故知者乾道作者坤道夫子于乾則曰知至至之知終終之乾能兼坤故知與行無不盡也至于坤則曰直其正也方其義也坤承乾而行者故特言行之而已程子謂乾是聖人之事坤是學者之事蓋乾能盡知與行而坤則但能行之而已此所以為有間也或謂河圖與卦畫不相似伏羲則之而畫卦若之何而則之夫河圖之數自一至十一三五七九為陽二四六八十為隂一者陽之始二者隂之始故聖人取一以畫乾取二以畫坤造化之道氣有二而行有五一三五七九者陽之行也二四六八十者隂之行也二非五則不能變化五非二則不能自行故夫子總天之五數得二十五總地之五數得三十蓋言隂陽之所以成變化行鬼神者在乎五也五行在易于卦變處方入用天地之間對待流行而已對待者體靜而生流行者體動而成伏羲八卦對待者也體靜而生則吉凶悔吝由乎我故曰先天文王八卦流行者也體動而成則吉凶悔吝奉乎天故曰後天易中之言仁或為隂或為陽仁者見之謂之仁仁隂也立人之道曰仁與義仁陽也蓋自智仁而言則智先而仁後智動而仁靜自仁義而言則仁先而義後仁行而義止此隂陽之所以異也易有太極之易未生兩儀之易也天地設位而易行乎其中生兩儀後之易也其理則同其時則異故易在兩儀之先其易無體在兩儀之後其易則有體矣藏諸用有兩義有在顯仁之前者有在顯仁之後者在顯仁之前則所以顯仁者為用以其不可見故為藏諸用在顯仁之後則既顯而為物矣一物又各具生生之用故亦為藏諸用寒暑也晝夜也生物之隂陽也氣形也魂魄也物生之隂陽也生物之隂陽則屈伸相推無不變也物生之隂陽則陽能變而隂不能變故易大傳曰遊魂為變而不及魄者物生之隂陽也易中言變化者剛柔之窮皆變變則化也變者化之漸化者變之成變在化之先故為陽化在變之後故為隂蓋以先後為隂陽非謂陽動為變隂動為化也大傳言易有三易有太極易無體易無思無為言易之本也天地設位而易行乎其中乾坤成列而易立乎其中言易之用也易與天地準易有聖人之道四之類言易之書也易有太極形而上之道也儀象八卦形而下之器也自道而言則器雖未形而器之理無不具也自器而言則道雖不可見而道之妙又無不在也繼善陽也成性隂也此以天命之序而言隂陽也仁者隂也智者陽也此以物受之性而言隂陽也然陽之所以為陽者皆動而無體也隂之所以為隂者皆靜而有體也坎之隂為陽所得則升而為雲陽淺則為霧坎之陽為隂所纍則降而為雨隂淺則為露隂在外陽不得出則為雷隂固則為地動震隂在內陽不得入則為風隂固則為大風巽陽包隂則為霰離陽和隂則為雪離交坎隂包陽則為雹坎隂入陽則為霜坎交離隂陽之精互藏其宅則為日為月離坎隂陽相戛則為電隂陽失位則為霓凡卦柔近剛則柔為得剛剛近柔應柔則剛為柔纍易者知變易之道而無體也其以隂陽之變言易者隂陽非易隂陽變易而無體者易也猶形而上者謂之道其以一隂一陽之謂道者隂陽非道一隂一陽運而無形者道也夫易者所以生隂陽兩儀即隂陽今指隂陽而言易者欲明無非虛無雖無形無體而有隂陽變易之理也易有太極者不可見動而生物者可見不可見者形而上之道也可見者形而下之器也聖人學其可見者而達其不可見者故夫子曰下學而上達吉凶悔吝具四象之義悔者吉之未成也吝者凶之未成也猶少隂少陽未成乎隂陽也貞吉貞凶貞厲貞吝其所繫雖若不同然皆一理也其得本卦本爻之正者則曰貞吉其失本卦本爻之正者則曰貞凶其失之淺者則曰貞厲曰貞吝無咎有五義師之彖吉而無咎者也節之三過由巳作而無所歸咎者也大過之上凶而不可咎者也晉之初善補過而無咎者也萃之四獲吉乃能無咎者也無悔有四義咸之五安于無事而無悔者也復之五自修而免悔者也大壯之五理之必至而無所可悔者也渙之三急于成功不以悔為悔者也吉無咎有二義如師之二言吉而又無咎也如益之初萃之四言當獲吉而後無咎也乾坤屯隨臨無妄皆有元亨利貞乾主造化全體無所不傋坤承乾以成化故加牝馬字其餘卦則或主一時或主一事而已範圍天地之化而不過曲成萬物而不遺神也通乎晝夜之道而知易也此章之神指發而妙萬物者為言也易指欲發者為言也無思無為寂然不動易也感而遂通天下之故神也此章之易指未發者為言也神指初發者為言也蓋易者神之本神者易之用以寂感言之明矣然寂之中又有感而感之中又有寂故夫子之言不一而足也乾坤成列而易立乎其中是言太極具于形器之中也天地設位而易行乎其中是言太極在形器之中復動而生也或問通乎晝夜之道而知為寂中有感固得之矣而謂範圍天地之化而不過曲成萬物而不遺為感中有寂則未之見也曰範圍天地之化即乾道變化之序也曲成萬物即各正性命之事也周子以為誠之復朱子以為太極之體所以立明其曰復曰立之義則其寂然之義可見矣大傳中以易與神對言者有三生生之謂易至隂陽不測之謂神就易書而言也範圍天地之化而不過至易無體易無思無為至非天下之至神孰能與于此就人心而言也範圍天地之化而不過一章言聖人盡神而本于易也易無思也一章言君子學易而至于神也感而動者發于中而無次序坎離是也動而運行者始于下而有次序震巽艮兊是也夫子以仁義禮智為元亨利貞然仁義禮智之在人心其發于情也不以序而見與坎離同義元亨利貞在天時則運于氣也必以序而行與震巽艮兊同義不以序者感而初發也必以序者發而後運也理雖同而時有先後此又不可不察也乾坤者對待之醇也坎離者對待之交也咸恆者對待之行也既濟未濟者對待之雜也氣化者有生之始而初生也故上經始乾坤形化者運行之終而復生也故下經始咸恆震巽艮兌動而運行者也然皆終于坎離者運行當止于對待乃能復生也既濟未濟雖非坎離坎離之交也聖人有以見天下之賾擬諸其形容象其物宜是故謂之象象者像天下之賾也拘乎卦則易之所以為易者偏矣聖人有以見天下之動觀其會通以行其典禮繫辭焉以斷其吉凶是故謂之爻爻者效天下之動也拘乎辭則易之所以為易者滯矣夫極天下之賾者存乎卦鼓天下之動者存乎辭既知觀象玩辭又知所謂極與鼓之義則卦非止所設之卦辭非止所指之辭其于易之賾也無不傋易之動也無不周豈世之所謂忘言忘象者可同日而語哉程子易序易變易也隨時變易以從道也既曰從道則所謂易者非易之理乃指易書也聖人立象以盡意設卦以盡情偽繫辭焉以盡其言夫子豈欺我哉世儒乃欲忘象忘言果聖人作易之意乎聖人之意正在乎言象之間也惟變而通之則象可以盡其利鼓之舞之則辭可以盡其神本末一貫皆實事也欲忘末而求本是乃老聃之學豈聖人作易之意哉易有太極是生兩儀兩儀生四象四象生八卦觀夫子立此數語則知所以生者不皆在未生兩儀之太極故先師謂一每生二一者太極也太極生兩儀則太極便在兩儀中故曰兩儀生四象及生四象則太極便在四象中故曰四象生八卦及生八卦則太極便在八卦中以是推之則太極隨生而立若無與于未生兩儀之太極也但人之為學茍惟守夫物中之太極則或囿于形而不得其正必須識得未生兩儀太極之本則雖在兩儀在四象在八卦以至在人心皆不失其本然之妙矣此夫子明卦象之所由所以必原易有太極之本而子思之所謂大本者亦正在乎此學者不可不識也漸進也坤上爻進居乾下位故曰漸歸妹退也坤下爻退居乾上位故曰歸妹皆主柔爻進退為義也咸以神交恆以神運一滯乎形則咸恆之道不全矣故其六爻非不相應得者亦不過悔亡而已夫子所以特詳咸恆之道于釋彖之下者正以此耳謙陽止乎內豫陽動乎外然皆以順為用也蠱之彖曰先甲三日後甲三日巽之五曰先庚三日後庚三日先甲後甲先庚後庚皆所以號令也巽為號令蠱之巽初卦也為號令之始甲始也蠱又為事故繫之于蠱彖焉巽之巽重巽也申號令也庚更也故繫之于上巽焉命令者君之所出故又以五言之乾漸以一物之次序明爻象咸艮以一身之次序明爻象井革以一卦之次序明爻象小畜者巽畜乾也大畜者艮畜乾也巽之主柔爻也艮之主剛爻也故小畜主四柔畜剛也大畜主上剛畜剛也凡陽包隂則是隂麗乎陽事之常也震下艮上為頤頤養正也言隂求養乎陽正也故曰養正兊下巽上為中孚中孚信也言隂必麗乎陽故曰信與離同義凡隂包陽則為陽陷于隂過常之事也大者謂陽巽下兊上則兩隂包四陽陽數過焉故曰大過小者謂隂艮下震上則四隂包兩陽隂數過焉故曰小過與坎同義臨與震同觀與艮同大壯與兊同遁與巽同天地之道在氣者當交在位者不可易觀否泰兩卦隂陽往來則可知氣運之通塞觀大過歸妹漸數爻剛柔上下則可以知居位之吉凶易有太極而生兩儀兩儀各具一太極而生生與氣化形化之事同一義也易有太極理也兩儀氣也形化形也有理斯有氣有氣斯有形本一道也故兩儀雖各具太極而生生而易有太極之妙無不在也形化雖各以種類而生生而氣化之理無不在也但以形而言氣則形易見而氣難見以氣而言理則氣易明而理難明今且以形化之事明之天下之物各以種類而生則氣化之事宜若無矣而聚水之蟲魚積土之草木皆自然而生又豈可謂無氣化之事耶蓋形化即氣化似二而非二也非知道者其孰能識之天數一一中有三以象言之則圓者徑一圍三地數二二中有兩以象言之則方者徑一圍四此天地之所以分也縱而數之一中有三橫而數之一中有四三之中各有四四之中各有三此天地之數所以同十二也故四十八蓍以十二約之為四存一以為體分三以為用故天數體一而用三存二以為體分二以為用故地數體二而用兩也天道之常先陽而後有隂先始而後有終先生而後有死今易所言而曰隂陽曰終始曰死生者皆降一等而取其變也蓋自其常者而言之但見其先後兩事而窮焉自其變者而言之則窮而復通未嘗巳也生生之道萬古不息者實于兩言之間盡之矣豈特如世之所謂文從字順而已哉元亨利貞乾道之則也其本不可得而見夫子所謂萬物資始品物流形各正性命者特因其運行之迹指以示人耳學者不可便謂元亨利貞如此而已也或問文言曰君子行此四德而先後不同何也曰仁者生物而未見貞者幹事而無形故夫子先言德因物之文而禮可見因物之分而義可明故夫子先言物天地之間對待流行而已易體天地之撰者也故伏羲八卦圓圖天地定位至水火不相射以對待而作也文王八卦圓圖帝出乎震至成言乎艮以流行而作也伏羲六十四卦橫圖始乾夬大有終觀否剝坤以流行而作也文王六十四卦橫圖始乾坤屯蒙終既濟未濟以對待而作也是知主對待者必以流行為用主流行者必以對待為用學者不可不察也或問參伍以變錯綜其數與變數象之所繫先後義未明何也曰夫子之言曲而無不中今且舉其一二例以明之如渙之剛來而不窮柔得位而上同所謂參以變也賁之柔來而文剛分剛上而文柔所謂伍以變也如揲蓍之法分二之後置右揲左復置左揲右左右者所謂錯其數也置揲而復置揲者所謂綜其數也故通其上下往來之變則于賁遂成天之文于渙遂成水之文極其歸竒之數則得十二者遂定老陽之象得二十四者遂定老隂之象得二十者遂定少陽之象得十六者遂定少隂之象也貞固也以貞固足以幹事取之也貞正也以君子正也取之也蓋貞者隨在各有也立乎事物之中各得其正之謂貞固在剛則曰大貞在柔則曰小貞在君子則曰君子貞在女子則曰女子貞以至在武人在童僕在牝馬莫不皆曰貞焉又以其永久者言之則曰永貞以其不息者言之則曰不息之貞又自夫用貞者言之當安則曰安貞當居則曰居貞當其可則曰可貞當其不可則曰不可貞當艱則曰艱貞其利則曰利貞其不利則曰不利貞不可疾也則曰不可疾貞又至于貞之為用則有吉焉有厲焉有吝焉有凶焉有疾焉有亨焉有勝焉有觀焉有明焉其端不可得而窮也惟善易者隨在玩之則其義莫不皆得其當學者不可以正固兩義而拘之也易者神之本也神者易之用也貞者易之位也易者以變易無體而言也神者以妙萬物者而言也貞者以萬物各正性命者而言也易則神神則貞乾之彖曰元亨利貞貞則當復為元矣貞元之間其易之復乎故大傳曰乾坤成列而易立乎其中是兼貞之理也又曰天地設位而易行乎其中是兼元之理也易神貞同一理而殊於時學易者當識之或問仁柔義剛柔為隂剛為陽以此而觀則仁當屬隂義當屬陽矣曰仁主生發生發者陽之所為也義主收斂收斂者隂之所為也凡物有性有質故以性而言則仁陽而義隂以質而言則仁柔而義剛所以然者陽動生柔隂靜生剛也或問兩儀雖各具太極而生生而易有太極之妙無不在以氣化形生之事明之似未分曉如何曰此理之自然凡有生者無不然也但氣化形生之事前賢之所未言今更請以前賢之所嘗言者言之天命之性純粹至善稟受之性或流為惡性一而已所稟之性雖有不同而天命之性無不在也故人雖各以其性而生生又豈可謂天命之性不存焉有能于此克而復之則天命之性即存初非别取一性換此一性也試于此而察之又何疑焉或問大傳之首捨健順而言易簡必有深意不知如何曰健順是乾坤之性易簡是健順之發用也不言易簡則健順之情狀不可見又曰乾天下之至健也德行恆易以知險坤天下之至順也德行恆簡以知阻又曰夫乾確然示人易矣夫坤隤然示人簡矣詳此則必知其情狀之所為而天下之理可得矣或問太極動而生陽靜而生隂其先後之序不可易也而大傳曰闔戶謂之坤闢戶謂之乾乃坤先乎乾靜先乎動何也曰此章之義主變通而言也靜而復動之時變通之義始著故以一闔一闢言之其他如隂陽死生之所以先後者皆此義不可不察智字有兩義若以義智為言則智當屬隂若以智仁為言則智當屬陽蓋智前一半方收藏而後一半復開發也或問朱子罕言所以生隂陽之太極至于隂陽中之太極則屢言之何也曰自太極而隂陽自隂陽而萬物皆是一貫但時有不同則理氣有異耳未生隂陽之時所謂太極者無聲臭儀象之可求專以此時為言則淪于虛無無所底止及其生隂陽之後始有儀象之可觀則其本然之妙動靜之機生生之道真實無妄有可得而言者以此為言則學者有定見而免淪于虛無之失矣故孟子言性亦只就惻隱羞惡之端而求之也程子曰人生而靜以上更不容説而朱子嘗謂捨愛不可以言仁者皆此義也蓋仁之理不可見茍不自其發動處求之則仁之情狀豈可得而言耶須于此等處熟思當得朱子之意然而善學者又當以此通神明之德也以柔得剛而居君位者皆曰大君言此為大者君也復其見天地之心乎天地大德曰生生者陽也陽盡即復故于復之時可以見天地生生不息之心大壯言正大而天地之情可見大壯四陽三陽居內卦一陽出外卦情見乎外者故曰天地之情可見咸恆萃言天地萬物之情可見咸恆感應而萃聚于此之時則天地萬物之情狀皆可見豫遁姤旅言時義者言當其時處其義也坎睽蹇言時用者言當其時而妙其用也頤大過解萃言時者言當謹其時也隨言隨時之義者言當隨時為義也或問既曰先有理後有氣又曰有則俱有何也曰先有理後有氣者形而上為道形而下為器之謂也有則俱有者道即器之謂也蓋不分先後則理氣不明不合理氣則判為二物如性之與情未發巳發自有先後固不可道性情同時也然情之本實具于性非先有此性而後别生一情是有此性即有此情也故曰有則俱有須著如此兩説耳非知道者其孰能通之理即氣之微氣即理之著性即情之微情即性之著皆一貫也但其時有不同故因其發用而立名有異矣或問乾之文言可與存義與坤之文言義以方外兩義字有别否曰義只是一義但存義之義是乾之聖人巳發在事物之上存之可為法於世者方外之義乃是坤之君子從心發出以裁制於外者細而審之亦不能無始終次第之異耳以學者言之須是先集聖人所存之義積之于中所積既多自然生得心中所發之義以方于外也以此而分則集聖人所存之義屬乎知從心中所發之義以方外者屬乎行其義之為義雖不可為二恐必須如此次第分看然後可識用力之地也或問死生之説若以為死而復生則是佛氏之輪迥回若以為死即斷滅則百世之祖又安能致享若以為一氣相通則山川鬼神與巳不屬古人以何道而祭之不知所謂原始反終之説為如何曰易有太極是于化原將發而為言也形而上為道形而下為器是于成物之後分言也此蓋平鋪正説至于原始反終乃是于流行終始之端可見不可見之際指示大本所以生生之妙最為親切今以人之死生觀之死而復生則有近乎佛氏之輪迥回生而接死則于古人之祭未盡達問難反復似明復晦是皆惟末之求所以紛紛擾擾千言萬語終不能通也不知夫子謂知死生之説正欲人原今日之所始反前日之所終即其終而復始之間察其所以然之本耳茍自其本者求之則生生不息之樞紐大而彌綸六合久而貫徹古今無一事一物之不該聖人具此所以贊化育質鬼神俟百聖與天地並立而三也大本所以生生不息有感必通自然而然終始死生特其變化有形者之兩端耳無可疑者聖人既正説以明其理又反説以著其機委曲詳盡可謂至矣學聖人者可不于此而致力焉神而思之靜而體之必有可得而言者矣使其所存之本無愧于聖人則于感也亦將如聖人無所不通矣若夫佛氏之輪迥回變怪之間有乃遊氣紛擾萬化中之一二非理之正何足道哉或問敬以直內義以方外其説如何曰天命之性正性也心具正性心之正也謂之敬者戒愼恐懼保其正也謂之直者言心發于內亭亭當當無一毫私曲于其間也如此則靜時固正動時亦正也是敬以直內之説也謂之義者裁制于中事物各得其宜而不失其正也謂之方者止之于外左右前後各有定則亦不失其正也如此則中之制者固正外之止者亦正也是義以方外之説也易象意言
