body:
  text: 易象意言易類提要臣等謹案易象意言一卷宋蔡淵撰淵蔡元定之子蔡沈兄也嘗從學于朱子故闡易理者居多而不廢漢儒互體之說則兼言象數又其家學矣夫易即象數以寓理京焦諸家流為術數占候之學固失聖人之本旨自王弼之易既行儒者遂置象數于不講而所謂理者亦漸流為空談矣淵是書以易象為名而所言皆即象以窮理葢易學之能酌其中者世無傳本故朱彝尊經義攷以為已佚永樂大典所載首尾完具猶當時祕府舊本謹録而傳之俾學易者有攷焉乾隆四十六年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:cd2738cd3e6869a2ba32114491903d684533521205fae0cce3b770e2008f27e2
